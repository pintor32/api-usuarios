<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Gestión de Usuarios</title>
  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: 2em auto;
      padding: 1em;
    }

    input,
    button {
      padding: 0.5em;
      margin: 0.25em;
    }

    li {
      margin: 0.5em 0;
    }
  </style>
</head>

<body>
  <h1>Usuarios</h1>
  <ul id="lista"></ul>

  <h2>Nuevo usuario</h2>
  <input id="nombre" placeholder="Nombre">
  <input id="email" placeholder="Email" type="email">
  <input id="edad" placeholder="Edad" type="number">
  <button id="btn-crear">Crear</button>

  <script src="app.js"></script>
</body>

</html>
